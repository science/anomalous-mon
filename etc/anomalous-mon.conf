# anomalous-mon configuration

CPU_THRESHOLD=60           # percent of one core — per-process single-core threshold
CPU_THRESHOLD_TOTAL=25     # percent of total CPU (all cores combined)
CPU_SUSTAINED_CYCLES=5     # consecutive samples before alert (5 min at 60s interval)
OOM_LOOKBACK="2 minutes"   # journal window to check on cold start

# Per-process overrides for sustained cycles (process name → cycles).
# Use comm name as shown by ps/pidstat (max 15 chars, no path).
declare -A CPU_SUSTAINED_OVERRIDES=(
    [firefox]=120        # 2 hours — video playback is normal
    [firefox-bin]=120    # 2 hours — child processes (content, rdd, etc.)
    [qemu-system-x86]=120  # 2 hours — VMs sustain CPU normally
    [slack]=120            # 2 hours — video calls sustain CPU
    [zoom]=120             # 2 hours — video calls sustain CPU
)

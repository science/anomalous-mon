# anomalous-mon configuration

CPU_THRESHOLD=60           # percent of one core — per-process single-core threshold
CPU_THRESHOLD_TOTAL=25     # percent of total CPU (all cores combined)
CPU_SUSTAINED_CYCLES=5     # consecutive samples before alert (5 min at 60s interval)
OOM_LOOKBACK="2 minutes"   # journal window to check on cold start
OOM_COOLDOWN=1800          # seconds before re-alerting same OOM event (30 min)

# Per-process overrides for sustained cycles (process name → cycles).
# Use comm name as shown by ps/pidstat (max 15 chars, no path).
declare -A CPU_SUSTAINED_OVERRIDES=(
    [firefox]=120        # 2 hours — video playback is normal
    [firefox-bin]=120    # 2 hours — child processes (content, rdd, etc.)
    [qemu-system-x86_64]=120  # 2 hours — VMs sustain CPU normally
    [slack]=120            # 2 hours — video calls sustain CPU
    [zoom]=120             # 2 hours — video calls sustain CPU
)

# Disk-space monitoring
DISK_WARN_PCT=80              # percent-used threshold for WARN
DISK_CRIT_PCT=92              # percent-used threshold for CRITICAL
DISK_MIN_FREE_GB=10           # WARN is AND-gated by this absolute headroom
DISK_WARN_COOLDOWN=1800       # 30 min between WARN repeats per mount
DISK_CRIT_COOLDOWN=300        # 5 min between CRITICAL repeats per mount

# Per-mount override. Value is "warn:crit:min_free_gb"; any field may be "-"
# to inherit the default. /boot legitimately runs 70–80% full on many distros.
declare -A DISK_THRESHOLD_OVERRIDES=(
    [/boot]="90:97:0.1"
    [/boot/efi]="90:97:0.05"
    # Windows Recovery Partition (read-only, intentionally near-full by design).
    # 'no_automount' flag set but udisks2 mounts it anyway. Effectively silenced.
    [/media/steve/62B2B6FAB2B6D1B1]="99:99:0.001"
)

# Stale-files monitoring (weekly scan, separate systemd timer).
# Surfaces large files not modified in a long time as candidates for review.
# NOTE: uses mtime, not atime — relatime/noatime mounts make atime unreliable.
# A file you frequently read but never edit will still look stale (intended).
STALE_FILES_MIN_SIZE_GB=1               # ≥ 1 GiB
STALE_FILES_AGE_DAYS=180                # not modified in 6 months
STALE_FILES_ACK_TTL=90                  # acks expire and re-prompt after N days
STALE_FILES_MAX_REPORT_ENTRIES=50       # cap on the report (sorted by size desc)
STALE_FILES_ROOTS=("$HOME")             # scan roots; add more here as needed
STALE_FILES_IGNORE=(
    "$HOME/.cache"
    "$HOME/.var"                        # Flatpak per-app data
    "$HOME/.local/share/Trash"          # Trash is the answer, not the problem
    "$HOME/.local/share/flatpak"
    "$HOME/snap"
    "$HOME/.steam"                      # Steam games — user knows
    "$HOME/.mozilla/firefox/*/storage"  # browser site storage
)
# Fstype regex used to auto-prune FUSE/network mounts under scan roots.
# Anchored implicitly via ^(...)$ in the matcher.
STALE_FILES_FSTYPE_EXCLUDE='fuse\..*|nfs.*|cifs|smbfs|virtiofs|sshfs|gvfs|davfs'
